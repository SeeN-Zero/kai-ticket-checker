kai.puppeteer.headless=${KAI_PUPPETEER_HEADLESS:true}
kai.puppeteer.user-data-dir=${KAI_PUPPETEER_USER_DATA_DIR:.puppeteer-profile}
kai.puppeteer.manual-wait-seconds=180
kai.puppeteer.max-tabs=5
kai.puppeteer.executable-path=${KAI_PUPPETEER_EXECUTABLE_PATH:}
kai.cloudflare.max-retries=3
kai.cloudflare.retry-delay-seconds=20
kai.telegram.bot-token=${KAI_TELEGRAM_BOT_TOKEN:-}
kai.scheduler.every=${KAI_SCHEDULER_EVERY:30m}
kai.scheduler.enabled=${KAI_SCHEDULER_ENABLED:true}
kai.subscription.password=${KAI_SUBSCRIPTION_PASSWORD:-}

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${KAI_DB_USERNAME:postgres}
quarkus.datasource.password=${KAI_DB_PASSWORD:-}
quarkus.datasource.jdbc.url=${KAI_DB_JDBC_URL:jdbc:postgresql://localhost:5432/kai_ticket_checker}
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=${KAI_DB_LOG_SQL:false}

%prod.quarkus.http.host=0.0.0.0
%prod.quarkus.http.port=8080

quarkus.cache.caffeine."stations-cache".expire-after-write=24H
# OpenAPI and Swagger UI configuration
mp.openapi.extensions.smallrye.info.title=KAI Ticket Checker API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=API untuk memantau ketersediaan tiket KAI menggunakan Puppeteer dan integrasi Telegram.
quarkus.swagger-ui.always-include=true
