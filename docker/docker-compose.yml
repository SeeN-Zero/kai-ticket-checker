name: kai-ticket-checker

services:
  kai-checker-a:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BASE_IMAGE: "${KAI_BASE_IMAGE:-kai-ticket-checker-base:latest}"
    image: kai-ticket-checker:latest
    container_name: kai-checker-a
    environment:
      QUARKUS_HTTP_PORT: "8081"
      KAI_PLAYWRIGHT_HEADLESS: "true"
      KAI_SCHEDULE_START_DAY: "25"
      KAI_SCHEDULE_END_DAY: "30"
      KAI_ROUTE_ORIGINATION: "KM:KEBUMEN"
      KAI_ROUTE_DESTINATIONS: "PSE:PASARSENEN,GMR:GAMBIR"
      KAI_PLAYWRIGHT_USER_DATA_DIR: "/profiles/a"
      KAI_TELEGRAM_BOT_TOKEN: "${KAI_TELEGRAM_BOT_TOKEN}"
      KAI_TELEGRAM_CHAT_ID: "${KAI_TELEGRAM_CHAT_ID}"
    volumes:
      - kai-profile-a:/profiles/a
    ports:
      - "8081:8081"
    restart: unless-stopped

  kai-checker-b:
    image: kai-ticket-checker:latest
    container_name: kai-checker-b
    depends_on:
      - kai-checker-a
    environment:
      QUARKUS_HTTP_PORT: "8082"
      KAI_PLAYWRIGHT_HEADLESS: "true"
      KAI_SCHEDULE_START_DAY: "15"
      KAI_SCHEDULE_END_DAY: "19"
      KAI_ROUTE_ORIGINATION: "PSE:PASARSENEN"
      KAI_ROUTE_DESTINATIONS: "KM:KEBUMEN"
      KAI_PLAYWRIGHT_USER_DATA_DIR: "/profiles/b"
      KAI_TELEGRAM_BOT_TOKEN: "${KAI_TELEGRAM_BOT_TOKEN}"
      KAI_TELEGRAM_CHAT_ID: "${KAI_TELEGRAM_CHAT_ID}"
    volumes:
      - kai-profile-b:/profiles/b
    ports:
      - "8082:8082"
    restart: unless-stopped

volumes:
  kai-profile-a:
  kai-profile-b:
